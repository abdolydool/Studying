<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classroom Real-Time Study</title>
    <!-- jsPDF and AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
              mono: ['JetBrains Mono', 'Fira Code', 'monospace']
            }
          }
        }
      }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- PeerJS CDN -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <!-- AlpineJS CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc; /* Slate-50 */
      }
      [x-cloak] { display: none !important; }
    </style>
  </head>
  <body class="min-h-screen text-slate-800 flex flex-col antialiased selection:bg-indigo-100" x-data="classroomApp">

    <!-- Global Header -->
    <header class="w-full border-b border-slate-200/80 bg-white/80 backdrop-blur-md sticky top-0 z-30">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="h-9 w-9 bg-indigo-900 rounded-lg flex items-center justify-center text-white shadow-sm shadow-indigo-200">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14v7" />
            </svg>
          </div>
          <h1 
            @click="handleTitleClick" 
            class="text-xl font-bold tracking-tight text-slate-900 cursor-pointer select-none active:scale-95 transition-transform"
            title="Click 3 times to access Teacher Gate"
          >
            Digital School Campus
          </h1>
        </div>

        <div class="flex items-center gap-2">
          <!-- Active Status Badge -->
          <template x-if="role === 'student' && connectionStatus === 'connected'">
            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-indigo-50 text-indigo-900 border border-indigo-200">
              <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
              Enrolled (Student)
            </span>
          </template>
          <template x-if="role === 'teacher'">
            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-indigo-900 text-slate-100 border border-indigo-950">
              <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
              Administrative Mode
            </span>
          </template>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8 max-w-7xl w-full mx-auto">
      
      <!-- LOBBY STATE (Initial Entrance) -->
      <template x-if="role === 'lobby' && activeMode === 'single'">
        <div class="w-full max-w-md bg-white rounded-2xl border border-slate-200 shadow-xl p-8 transition-all duration-300 hover:shadow-2xl hover:border-slate-300" x-cloak>
          <div class="text-center mb-8">
            <div class="mx-auto w-14 h-14 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mb-4 border border-indigo-100">
              <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
              </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-900">Student Sign-In</h2>
            <p class="text-slate-500 text-sm mt-1.5">Enter details below to start submission session</p>
          </div>

          <form @submit.prevent="joinAsStudent" class="space-y-5">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">Your Full Name</label>
              <input 
                type="text" 
                required 
                x-model="studentName" 
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400 font-medium" 
                placeholder="e.g., Jane Doe"
              >
            </div>

            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">Classroom Code</label>
              <input 
                type="text" 
                required 
                x-model="classCodeInput" 
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400 font-mono tracking-wider font-semibold uppercase" 
                placeholder="e.g., STUDY-KB82"
              >
            </div>

            <!-- Error Notice -->
            <template x-if="connectionStatus === 'error'">
              <div class="p-3 bg-rose-50 border border-rose-100 rounded-xl text-rose-700 text-xs font-medium flex gap-2 items-start">
                <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span x-text="connectionError"></span>
              </div>
            </template>

            <!-- Submit Button / Loader -->
            <button 
              type="submit" 
              :disabled="connectionStatus === 'connecting'"
              class="w-full flex items-center justify-center gap-2.5 bg-slate-900 text-white font-semibold px-5 py-3.5 rounded-xl hover:bg-slate-800 focus:ring-4 focus:ring-slate-900/10 transition-all outline-none disabled:bg-slate-300 disabled:cursor-not-allowed group"
            >
              <template x-if="connectionStatus === 'connecting'">
                <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              </template>
              <span x-text="connectionStatus === 'connecting' ? 'Connecting to Room...' : 'Connect & Attend Session'"></span>
              <template x-if="connectionStatus !== 'connecting'">
                <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                </svg>
              </template>
            </button>
          <button 
            type="button"
            @click="activeMode = 'portal'"
            class="w-full text-indigo-600 text-xs font-semibold hover:text-indigo-800 transition-colors mt-2"
          >
            Student Portal Access
          </button>
          
          <button 
            type="button"
            @click="role = 'student'; activeMode = 'single'"
            class="w-full text-slate-500 text-xs font-semibold hover:text-slate-700 transition-colors mt-2"
          >
            Continue as Temporary Student
          </button>
        </div>
      </template>

      <!-- SUB-STATE 4: STUDENT PORTAL -->
      <template x-if="activeMode === 'portal'">
        <div class="w-full max-w-md animate-fade-in bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
          <template x-if="!auth.isLoggedIn">
            <div class="space-y-4">
              <h3 class="text-xl font-black text-slate-900" x-text="auth.mode === 'login' ? 'Portal Login' : 'Create Account'"></h3>
              <input x-model="auth.username" type="text" placeholder="Username" class="w-full p-2 border border-slate-300 rounded">
              <input x-model="auth.password" type="password" placeholder="Password" class="w-full p-2 border border-slate-300 rounded">
              <div class="flex gap-2">
                <button @click="auth.mode === 'login' ? login() : register()" class="px-4 py-2 bg-indigo-600 text-white rounded font-bold" x-text="auth.mode === 'login' ? 'Login' : 'Register'"></button>
                <button @click="auth.mode = auth.mode === 'login' ? 'register' : 'login'" class="text-xs text-indigo-600">Switch to <span x-text="auth.mode === 'login' ? 'Register' : 'Login'"></span></button>
              </div>
              <button @click="activeMode = 'single'" class="w-full text-xs text-slate-500 hover:text-slate-700 pt-2">Back</button>
            </div>
          </template>
          
          <template x-if="auth.isLoggedIn">
            <div class="space-y-4">
              <h3 class="text-xl font-black text-slate-900">Welcome, <span x-text="auth.currentUser.email"></span></h3>
              <button @click="logout()" class="text-xs text-rose-600">Logout</button>
              <button @click="activeMode = 'single'" class="text-xs text-slate-500 hover:text-slate-700 block">Back</button>
              <div class="border-t pt-4">
                <h4 class="font-bold">My Grades</h4>
                <template x-for="grade in auth.currentUser.grades" :key="grade.exam">
                  <div class="p-2 bg-slate-50 border rounded mt-2">
                    <p x-text="grade.exam"></p>
                    <p class="font-bold text-indigo-700" x-text="grade.score + '%'"></p>
                    <p class="text-xs text-slate-600" x-text="grade.feedback"></p>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- STUDENT ROLE STATE -->
      <template x-if="role === 'student'">
        <div class="w-full max-w-3xl flex flex-col gap-6" x-cloak>
          <!-- Welcome Bar -->
          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 bg-white border border-slate-200 rounded-2xl px-6 py-4 shadow-sm">
            <div>
              <span class="text-xs font-semibold uppercase tracking-wider text-slate-450 text-indigo-600 block mb-0.5">Attendee Profile</span>
              <h2 class="text-lg font-bold text-slate-900" x-text="studentName"></h2>
            </div>
            <div class="flex items-center gap-3">
              <span class="text-slate-400 text-xs font-mono font-medium border border-slate-200 px-2.5 py-1 rounded bg-slate-50">
                Connected Workspace Peer
              </span>
              <button 
                @click="activeMode = 'portal'" 
                class="text-xs font-semibold text-indigo-700 hover:text-indigo-800 bg-indigo-50 border border-indigo-100 rounded-lg px-3 py-1.5 transition-colors"
              >
                My Portal
              </button>
              <button 
                @click="location.reload()" 
                class="text-xs font-semibold text-rose-600 hover:text-rose-700 bg-rose-50 hover:bg-rose-100 border border-rose-100 rounded-lg px-3 py-1.5 transition-colors"
              >
                Sign Out
              </button>
            </div>
          </div>

          <!-- Active Study Area -->
          <template x-if="!activeExam">
            <div class="bg-white border border-slate-200 rounded-2xl shadow-md overflow-hidden animate-fade-in">
              <!-- MEDIA CONTROLS (ADDED) -->
              <div class="border-b border-slate-200 bg-slate-50 px-6 py-3 flex items-center justify-center gap-4">
                <button class="p-3 bg-red-100 text-red-600 rounded-full hover:bg-red-200 transition-colors">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V7a3 3 0 016 0v4a3 3 0 01-3 3z"/></svg>
                </button>
                <button class="p-3 bg-slate-100 text-slate-700 rounded-full hover:bg-slate-200 transition-colors">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                </button>
                <button x-show="teacherAuth.isLoggedIn" class="p-3 bg-slate-100 text-slate-700 rounded-full hover:bg-slate-200 transition-colors">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                </button>
                <button x-show="!teacherAuth.isLoggedIn" class="p-3 bg-yellow-100 text-yellow-700 rounded-full hover:bg-yellow-200 transition-colors">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </button>
              </div>
              <!-- HEADER -->
              <div class="border-b border-slate-200 bg-slate-50 px-6 py-4.5">
                <span class="inline-flex items-center gap-1 text-xs font-bold uppercase tracking-wider text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full mb-2">
                  <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-ping"></span>
                  Broadcasting Feed
                </span>
                <h3 class="text-slate-500 text-sm font-medium">Instructor posted question:</h3>
              </div>

              <!-- WORKPLATE BODY -->
              <div class="p-6">
                <!-- Case: Waiting for Question -->
                <template x-if="!activeQuestion">
                  <div class="flex flex-col items-center justify-center p-12 text-center">
                    <div class="w-16 h-16 bg-amber-50 rounded-full border border-amber-100 flex items-center justify-center text-amber-500 animate-pulse mb-4">
                      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                      </svg>
                    </div>
                    <h4 class="text-xl font-bold text-slate-800">Waiting for Question...</h4>
                    <p class="text-slate-400 text-sm max-w-md mt-1.5">
                      The teacher hasn't broadcasted a live question yet. Enjoy the study break! We will activate automatically.
                    </p>
                  </div>
                </template>

                <!-- Case: Question Ready to Answer -->
                <template x-if="activeQuestion">
                  <div class="space-y-6">
                    <!-- The Broadcast Question -->
                    <div class="p-5 bg-indigo-50/50 border border-indigo-100 rounded-xl">
                      <p class="text-xl sm:text-2xl font-bold text-indigo-955 text-indigo-900 leading-snug font-sans" x-text="activeQuestion"></p>
                    </div>

                    <!-- Submission State: Submitted -->
                    <template x-if="answerSubmitted">
                      <div class="p-6 bg-slate-50 border border-slate-200 rounded-xl flex flex-col items-center text-center">
                        <div class="w-12 h-12 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center border border-emerald-100 mb-3">
                          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                          </svg>
                        </div>
                        <h4 class="text-lg font-bold text-slate-800">Your answer has been submitted!</h4>
                        <p class="text-slate-500 text-sm mt-0.5">We've locked your submission. Awaiting new questions.</p>
                        
                        <div class="w-full text-left bg-white border border-slate-200/80 rounded-xl p-4 mt-5">
                          <span class="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-2">My Locked Response</span>
                          <p class="text-slate-700 font-medium font-mono text-sm whitespace-pre-wrap leading-relaxed" x-text="lastSubmittedAnswer"></p>
                        </div>
                      </div>
                    </template>

                    <!-- Submission State: Ready to Answer -->
                    <template x-if="!answerSubmitted">
                      <form @submit.prevent="submitStudentAnswer" class="space-y-4">
                        <div>
                          <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Your Answer Space</label>
                          <textarea 
                            required 
                            x-model="studentAnswer"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400 h-40 resize-y font-medium text-slate-700 leading-relaxed" 
                            placeholder="Type your response or answers precisely here..."
                          ></textarea>
                        </div>

                        <div class="flex items-center justify-between pt-2">
                          <p class="text-xs text-slate-400 font-medium">Responses sync to the teacher in real-time instantly on transmission.</p>
                          <button 
                            type="submit" 
                            class="flex items-center gap-2 bg-indigo-600 text-white hover:bg-indigo-700 active:scale-[0.98] font-semibold px-6 py-2.5 rounded-xl border border-indigo-700 shadow-sm transition-all focus:ring-4 focus:ring-indigo-500/10"
                          >
                            Submit Response
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                            </svg>
                          </button>
                        </div>
                      </form>
                    </template>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Case: Active Quiz / Exam Mode -->
          <template x-if="activeExam">
            <div class="bg-white border border-slate-200 rounded-2xl shadow-lg overflow-hidden transition-all duration-300">
              
              <!-- HEADER -->
              <div class="border-b border-rose-100 bg-rose-50/50 px-6 py-5 flex items-center justify-between flex-wrap gap-2">
                <div>
                  <span class="inline-flex items-center gap-1 text-[10px] font-bold uppercase tracking-widest text-rose-600 bg-rose-50 px-2.5 py-1 rounded-full border border-rose-100 mb-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span>
                    Live Form Mode
                  </span>
                  <h3 class="text-lg font-bold text-slate-900" x-text="activeExam.title"></h3>
                </div>
                
                <div class="text-right">
                  <span class="text-xs font-mono font-bold text-rose-700 bg-rose-100 px-3 py-1.5 rounded-lg border border-rose-150" x-text="`Progress: ${getStudentExamProgressCount()} / ${activeExam.questions.length}`"></span>
                </div>
              </div>

              <!-- Live Horizontal Progress Line -->
              <div class="w-full bg-slate-100 h-1.5">
                <div 
                  class="bg-indigo-600 h-full transition-all duration-300 rounded-r"
                  :style="`width: ${(getStudentExamProgressCount() / activeExam.questions.length) * 100}%`"
                ></div>
              </div>

              <div class="p-6">
                <!-- SUBMITTED SCREEN -->
                <template x-if="studentExamSubmitted">
                  <div class="py-12 px-6 text-center max-w-lg mx-auto">
                    <div class="mx-auto w-16 h-16 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center mb-5 border border-emerald-100 shadow-sm animate-bounce">
                      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                      </svg>
                    </div>
                    <h4 class="text-2xl font-black text-slate-800">Answers Sealed & Submitted!</h4>
                    <p class="text-slate-500 text-sm mt-2 leading-relaxed">
                      Your responses were compiled and uploaded to the instructor. Hold on tight — the teacher will stop the draft checking period soon!
                    </p>

                    <div class="mt-8 text-left bg-slate-50 border border-slate-200/80 rounded-2xl p-5 space-y-4">
                      <span class="text-xs font-bold text-slate-400 uppercase tracking-widest block border-b border-slate-200 pb-2">Your Answers Record</span>
                      <template x-for="(q, idx) in activeExam.questions" :key="q.id">
                        <div>
                          <p class="text-xs font-bold text-slate-700 block mb-1" x-text="`Question ${idx + 1}: ${q.text}`"></p>
                          <p class="text-xs font-mono text-indigo-700 bg-white border border-slate-150 rounded px-2.5 py-1.5 overflow-x-auto whitespace-pre-wrap" x-text="studentExamAnswers[idx] || '(No response supplied)'"></p>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>

                <!-- ACTIVE EXAM FORM FILLING -->
                <template x-if="!studentExamSubmitted">
                  <div class="space-y-8">
                    <div class="bg-indigo-50 border border-indigo-100/50 rounded-xl p-4.5 text-xs text-indigo-850 flex gap-2.5 items-start">
                      <svg class="w-5 h-5 text-indigo-600 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                      </svg>
                      <p class="leading-relaxed">
                        Please fill in each response fields below. Selecting MCQs or entering open text answers updates the instructor dashboard <strong>in real-time</strong>. Ensure all questions are addressed before locking!
                      </p>
                    </div>

                    <!-- Questions Stack -->
                    <div class="space-y-6">
                      <template x-for="(q, index) in activeExam.questions" :key="q.id">
                        <div class="p-5 border border-slate-200 rounded-2xl bg-slate-50/50 space-y-4">
                          <div class="flex items-start justify-between gap-4">

                        </svg>
                      </button>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- SUB-STATE 3: SPELLING LAB -->
          <template x-if="activeMode === 'spellingLab'">

                        <input type="text" x-model="blank.answer" class="p-2 border border-slate-300 rounded" :placeholder="'Blank ' + (index + 1)">
                      </template>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </template>

        </div>
      </template>

      <!-- TEACHER ROLE STATE -->
      <template x-if="role === 'teacher'">

            <div class="flex items-center gap-3">

                <svg class="w-5 h-5 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />

              </div>

                </div>
              </div>
            </div>

                Spelling Lab
              </button>
              <button

                class="flex-1 sm:flex-none py-1.5 px-3.5 rounded-lg text-xs transition-all outline-none"

                      </template>
                      <template x-if="!copied">
                        <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                        </svg>
                      </template>
                    </button>
                  </div>

                  <!-- Stats Indicators -->

                    <div class="bg-indigo-50/40 rounded-xl p-3 border border-indigo-100/50 text-center">

                      <span class="text-[10px] uppercase font-bold text-slate-500 block">connected</span>
                    </div>
                    <div class="bg-emerald-50/40 rounded-xl p-3 border border-emerald-100/50 text-center">
                      <span class="text-2xl font-black text-emerald-700 font-mono" x-text="numAnswersSubmitted()">0</span>
                      <span class="text-[10px] uppercase font-bold text-slate-500 block">responses</span>
                    </div>
                  </div>
                </div>

                <!-- Question Dispatcher -->

                    <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />

                      <textarea

                        placeholder="e.g., Explain the difference between server-side and client-side rendering with examples."

                    >
                      <svg class="w-4 h-4 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                      </svg>
                      <span>Broadcast Question</span>
                    </button>
                    
                    <template x-if="numConnectedStudents() === 0">

                      </p>
                    </template>
                  </form>
                </div>
              </div>

              <!-- RIGHT COLUMN: Real-Time Live Answers (lg:col-span-8) -->

                  </template>
                  <template x-if="!currentTeacherQuestion">

                      </svg>

                    <span class="text-xs font-bold font-mono text-slate-550 text-indigo-650 bg-indigo-50 border border-indigo-100 px-2.5 py-0.5 rounded-full" x-text="`${numAnswersSubmitted()} / ${numConnectedStudents()} Submitted`">
                      0 / 0 Submitted

                  </div>

                  <!-- Body List / Grid -->
                  <div class="p-6 flex-1 flex flex-col justify-between">

                          <svg class="w-10 h-10 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M23 21v-2a4 4 0 00-3-3.87m-4-12a4 4 0 010 7.75" />

                                <template x-if="item.answer">
                                  <span class="inline-flex items-center gap-1 text-[10px] font-bold uppercase tracking-wider text-emerald-700 bg-emerald-50 border border-emerald-100 px-2 py-0.5 rounded-md">
                                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>

                                </template>
                              </div>
                            </div>
                          </div>
                        </template>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </div>
          </template>

          <!-- SUB-STATE 2: EXAM PORTAL & INTERACTIVE REAL-TIME REVIEW -->

                                  </div>
                                  <input 
                                    type="range" 
                                    min="0" 
                                    max="100" 
                                    x-model="item.score" 
                                    :disabled="graded"
                                    class="w-full text-indigo-600 cursor-pointer disabled:opacity-40"
                                  >
                                </div>

                                <!-- Feedback Comment -->
                                <div>
                                  <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Feedback Comments Box</label>
                                  <textarea 
                                    x-model="item.feedback" 
                                    :disabled="graded"
                                    class="w-full px-2.5 py-2 border border-slate-200 focus:ring-1 focus:ring-indigo-500/10 focus:border-indigo-400 outline-none text-xs font-semibold text-slate-800 rounded-lg max-h-20 disabled:bg-slate-50 disabled:text-slate-450"
                                    placeholder="Enter private qualitative commentary..."
                                  ></textarea>
                                </div>
                              </div>

                              <button 
                                @click="saveGradeToPortal(item); graded = true"
                                :disabled="graded"
                                class="w-full py-2.5 mt-4 bg-indigo-50 hover:bg-indigo-100 hover:border-indigo-300 text-indigo-700 font-bold border border-indigo-200 rounded-xl text-xs transition-colors uppercase tracking-widest disabled:bg-slate-100 disabled:border-slate-200 disabled:text-slate-400 cursor-pointer outline-none"
                              >
                                <span x-text="graded ? 'Grade Locked ✓' : 'Seal & Save to Portal'"></span>
                              </button>
                            </div>
                          </div>

                        </div>
                      </template>
                    </div>
                  </div>

                </div>
              </template>

            </div>
          </template>

        </div>
      </template>
    </main>

    <!-- Global Footer -->
    <footer class="py-6 border-t border-slate-200 bg-white">
      <div class="max-w-7xl mx-auto px-4 text-center text-xs text-slate-450 text-slate-500 font-medium">
        Interactive peer environment &bull; Created for educators &bull; Fully static client engine.
      </div>
    </footer>

    <!-- INSTRUCTOR PASSCODE MODAL (GATE POPUP) -->
    <div 
      class="fixed inset-0 bg-slate-900/40 backdrop-blur-md flex items-center justify-center z-50 p-4 transition-all"
      x-show="showSecretPopup"
      @keydown.escape.window="showSecretPopup = false"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 tracking-wide"
      x-transition:enter-end="opacity-100"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      x-cloak
    >
      <div 
        class="bg-white rounded-2xl border border-slate-200 shadow-2xl p-6 max-w-sm w-full transform overflow-hidden"
        @click.away="showSecretPopup = false"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="scale-95 translate-y-4"
        x-transition:enter-end="scale-100 translate-y-0"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="scale-100 translate-y-0"
        x-transition:leave-end="scale-95 translate-y-4"
      >
        <div class="flex items-center gap-3.5 mb-4 border-b border-slate-100 pb-3">
          <div class="w-10 h-10 rounded-lg bg-indigo-50 border border-indigo-100 text-indigo-600 flex items-center justify-center shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <div>
            <h3 class="text-base font-bold text-slate-900 leading-tight">Secret Instructor Gate</h3>
            <p class="text-slate-400 text-xs mt-0.5">Validate authentication to activate Hosting Console.</p>
          </div>
        </div>

        <div class="space-y-4">
          <template x-if="!teacherAuth.isLoggedIn">
            <div class="space-y-4">
              <h3 class="text-xl font-black text-slate-900" x-text="teacherAuth.mode === 'login' ? 'Teacher Login' : 'Create Teacher Account'"></h3>
              <input x-model="teacherAuth.email" type="email" placeholder="Email" class="w-full p-2 border border-slate-300 rounded">
              <input x-model="teacherAuth.password" type="password" placeholder="Password" class="w-full p-2 border border-slate-300 rounded">
              <div class="flex gap-2">
                <button @click="teacherAuth.mode === 'login' ? teacherLogin() : teacherRegister()" class="px-4 py-2 bg-indigo-600 text-white rounded font-bold" x-text="teacherAuth.mode === 'login' ? 'Login' : 'Register'"></button>
                <button @click="teacherAuth.mode = teacherAuth.mode === 'login' ? 'register' : 'login'" class="text-xs text-indigo-600">Switch to <span x-text="teacherAuth.mode === 'login' ? 'Register' : 'Login'"></span></button>
              </div>
            </div>
          </template>
          
          <template x-if="teacherAuth.isLoggedIn">
             <div class="space-y-4">
                <h3 class="text-xl font-black text-slate-900">Welcome, <span x-text="teacherAuth.currentUser.email"></span></h3>
                <button @click="teacherLogout()" class="text-xs text-rose-600">Logout</button>
             </div>
          </template>
          
          <button 
              type="button" 
              @click="showSecretPopup = false" 
              class="px-4 py-2 text-xs font-semibold text-slate-600 hover:bg-slate-50 rounded-lg transition-colors mt-4"
            >
              Close
            </button>
        </div>
      </div>
    </div>

    <!-- Application Controller logic -->
    <script>
      document.addEventListener('alpine:init', () => {
        Alpine.data('classroomApp', () => ({
          role: 'lobby',
          titleClicks: 0,
          showSecretPopup: false,
          secretPassword: '',
          popupError: false,

          studentName: '',
          classCodeInput: '',

          studentPeer: null,
          studentConn: null,
          connectionStatus: 'disconnected', 
          connectionError: '',
          activeQuestion: null,
          studentAnswer: '',
          answerSubmitted: false,
          aiPromptTemplate: `Generate exam questions. Format as a JSON array:
[
  { "text": "Question text?", "type": "mcq", "options": ["Option A", "Option B", "Option C"], "correct": "Option A" },
  { "text": "Explain concept X.", "type": "text", "options": [], "correct": "" }
]`,
          spellingLabPromptTemplate: `Generate a paragraph suitable for spelling practice in a classroom. Include 5-10 words in brackets [] that students should fill in by listening to the paragraph. For example: 'The quick [brown] fox jumps over the [lazy] dog.' Format as plain text.`,
          jsonImportInput: '',
          copyAIPrompt() {
             navigator.clipboard.writeText(this.aiPromptTemplate);
             alert('Prompt copied to clipboard!');
          },
          copySpellingAIPrompt() {
             navigator.clipboard.writeText(this.spellingLabPromptTemplate);
             alert('Spelling prompt copied to clipboard!');
          },
          importCustomExamQuestions() {
            try {
              const parsed = JSON.parse(this.jsonImportInput);
              if (!Array.isArray(parsed)) throw new Error('Not an array');
              this.customExamQuestions = parsed.map((q, idx) => ({
                id: Date.now() + idx,
                text: q.text || '',
                type: q.type || 'text',
                options: q.options || ['', '', '', ''],
                correct: q.correct || ''
              }));
              this.jsonImportInput = '';
              alert('Imported successfully!');
            } catch (e) {
              alert('Invalid JSON format. Please check the prompt format.');
            }
          },
          lastSubmittedAnswer: '',

          teacherPeer: null,
          teacherClassCode: '',
          teacherConnections: {}, 
          students: [], 
          copied: false,
          newQuestionInput: '',
          currentTeacherQuestion: null,

          // Exam and Progress check states
          activeMode: 'single', // 'single' or 'exam' or 'spellingLab'
          
          // Portal State
          auth: {
            isLoggedIn: false,
            username: '',
            password: '',
            currentUser: null,
            mode: 'login' // 'login' or 'register' or 'portal'
          },
          teacherAuth: {
            isLoggedIn: false,
            username: '',
            password: '',
            currentUser: null,
            mode: 'login'
          },
          studentDB: [],
          teacherDB: [],
          
          // Spelling Lab Data
          spellingLabParagraph: '',
          spellingLabBlanks: [],
          spellingLabReading: false,
          customExamTitle: 'Classroom Progress Quiz',
          customExamQuestions: [
            { id: 1, text: 'Explain the difference between vertical vs horizontal centering in CSS grid.', type: 'text', options: [], correct: '' },
            { id: 2, text: 'Which tag renders an unnumbered bullet list?', type: 'mcq', options: ['<ol>', '<ul>', '<li>', '<list>'], correct: '<ul>' }
          ],
          premadeExams: [
            {
              id: 'premade-fe',
              title: 'Frontend Fundamentals Exam',
              questions: [
                { id: 1, text: 'Which layout model is strictly designed for full 2-dimensional grid structures?', type: 'mcq', options: ['CSS Grid', 'Flexbox', 'Floats', 'Block Flow'], correct: 'CSS Grid' },
                { id: 2, text: 'Explain what the event loop in JavaScript accomplishes.', type: 'text', options: [], correct: '' },
                { id: 3, text: 'Which tag initiates an interactive client-side form submit or custom trigger?', type: 'mcq', options: ['<div>', '<form>', '<button>', '<a>'], correct: '<button>' }
              ]
            },
            {
              id: 'premade-se',
              title: 'CS Core: Algorithms & REST checkup',
              questions: [
                { id: 1, text: 'What is the average runtime complexity of building a Balanced BST or traversing it?', type: 'mcq', options: ['O(n)', 'O(log n)', 'O(n log n)', 'O(n²)'], correct: 'O(log n)' },
                { id: 2, text: 'Which standard HTTP status code is sent when requested index or endpoint resource is missing?', type: 'mcq', options: ['200 OK', '403 Forbidden', '404 Not Found', '500 Server Error'], correct: '404 Not Found' },
                { id: 3, text: 'Give one security reason why hashing is used for user password storage.', type: 'text', options: [], correct: '' }
              ]
            }
          ],
          activeExam: null, // student active exam model
          studentExamAnswers: {}, // student responses
          studentExamSubmitted: false, // student lock state

          init() {
            console.log('Classroom system fully booted!');
          },

          handleTitleClick() {
            if (this.role === 'teacher') return;
            this.titleClicks++;
            if (this.titleClicks >= 3) {
              this.titleClicks = 0;
              this.showSecretPopup = true;
              this.$nextTick(() => {
                if (this.$refs.passwordInput) {
                  this.$refs.passwordInput.focus();
                }
              });
            }
          },

          submitSecretPassword() {
            if (this.secretPassword.toLowerCase() === 'teach') {
              this.showSecretPopup = false;
              this.secretPassword = '';
              this.enterTeacherMode();
            } else {
              this.popupError = true;
              this.secretPassword = '';
              setTimeout(() => { this.popupError = false; }, 2000);
            }
          },

          enterTeacherMode() {
            this.role = 'teacher';
            this.initTeacherPeer();
          },

          initTeacherPeer() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 4; i++) {
              code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            this.teacherClassCode = 'STUDY-' + code;

            this.teacherPeer = new Peer(this.teacherClassCode);

            this.teacherPeer.on('connection', (conn) => {
              this.teacherConnections[conn.peer] = conn;
              this.addOrUpdateStudent(conn.peer, { connected: true });

              conn.on('open', () => {
                if (this.currentTeacherQuestion) {
                  conn.send({ type: 'QUESTION', payload: this.currentTeacherQuestion });
                }
                if (this.currentTeacherExam) {
                  conn.send({ type: 'EXAM_START', payload: this.currentTeacherExam });
                }
              });

              conn.on('data', (data) => {
                if (data.type === 'HANDSHAKE') {
                  this.addOrUpdateStudent(conn.peer, { name: data.name, connected: true });
                } else if (data.type === 'ANSWER') {
                  this.addOrUpdateStudent(conn.peer, { answer: data.answer });
                } else if (data.type === 'EXAM_PROGRESS') {
                  this.addOrUpdateStudent(conn.peer, { examAnswers: data.answers || {}, examSubmitted: false });
                } else if (data.type === 'EXAM_SUBMIT') {
                  this.addOrUpdateStudent(conn.peer, { examAnswers: data.answers || {}, examSubmitted: true });
                }
              });

              const handleDisconnect = () => {
                this.addOrUpdateStudent(conn.peer, { connected: false });
                delete this.teacherConnections[conn.peer];
              };

              conn.on('close', handleDisconnect);
              conn.on('error', handleDisconnect);
            });
          },

          addOrUpdateStudent(id, data) {
            const idx = this.students.findIndex(s => s.id === id);
            if (idx !== -1) {
              this.students[idx] = { ...this.students[idx], ...data };
            } else {
              this.students.push({
                id: id,
                name: data.name || 'Unknown Student',
                connected: data.connected !== undefined ? data.connected : true,
                answer: data.answer || null,
                examAnswers: data.examAnswers || {},
                examSubmitted: data.examSubmitted || false,
                score: 100,
                feedback: 'Exceptional work, very thorough response!'
              });
            }
            this.students = [...this.students];
          },

          sendQuestion() {
            if (!this.newQuestionInput.trim()) return;
            this.currentTeacherQuestion = this.newQuestionInput.trim();

            this.students = this.students.map(s => ({ ...s, answer: null }));

            Object.values(this.teacherConnections).forEach(conn => {
              conn.send({ type: 'QUESTION', payload: this.currentTeacherQuestion });
            });

            this.newQuestionInput = '';
          },

          copyCode() {
            navigator.clipboard.writeText(this.teacherClassCode);
            this.copied = true;
            setTimeout(() => { this.copied = false; }, 2000);
          },

          launchExam(examObj) {
            this.students = this.students.map(s => ({
              ...s,
              examAnswers: {},
              examSubmitted: false
            }));
            this.currentTeacherExam = JSON.parse(JSON.stringify(examObj));
            this.examStep = 'live';

            Object.values(this.teacherConnections).forEach(conn => {
              conn.send({ type: 'EXAM_START', payload: this.currentTeacherExam });
            });
          },

          stopActiveExam() {
            this.examStep = 'results';
            Object.values(this.teacherConnections).forEach(conn => {
              conn.send({ type: 'EXAM_STOP' });
            });
          },

          resetExamMode() {
            this.currentTeacherExam = null;
            this.examStep = 'catalog';
          },

          addCustomExamQuestion() {
            const nextId = this.customExamQuestions.length + 1;
            this.customExamQuestions.push({
              id: nextId,
              text: '',
              type: 'mcq',
              options: ['', '', '', ''],
              correct: ''
            });
          },

          removeCustomExamQuestion(index) {
            this.customExamQuestions.splice(index, 1);
            this.customExamQuestions.forEach((q, idx) => { q.id = idx + 1; });
          },

          launchCustomExam() {
            const validQuestions = this.customExamQuestions.filter(q => q.text.trim().length > 0);
            if (validQuestions.length === 0) return;

            const examObj = {
              title: this.customExamTitle.trim() || 'Custom Progress Check',
              questions: validQuestions.map((q, idx) => ({
                id: idx + 1,
                text: q.text.trim(),
                type: q.type,
                options: q.type === 'mcq' ? q.options.filter(o => o.trim() !== '') : [],
                correct: q.type === 'mcq' ? (q.correct || q.options[0]) : ''
              }))
            };
            this.launchExam(examObj);
          },

          joinAsStudent() {
            if (!this.studentName.trim() || !this.classCodeInput.trim()) return;

            this.connectionStatus = 'connecting';
            this.connectionError = '';

            const teacherCodeName = this.classCodeInput.trim().toUpperCase();
            this.studentPeer = new Peer();

            this.studentPeer.on('open', (id) => {
              const conn = this.studentPeer.connect(teacherCodeName);
              this.studentConn = conn;

              conn.on('open', () => {
                this.connectionStatus = 'connected';
                this.role = 'student';
                conn.send({ type: 'HANDSHAKE', name: this.studentName.trim() });
              });

              conn.on('data', (data) => {
                if (data.type === 'QUESTION') {
                  this.activeQuestion = data.payload;
                  this.studentAnswer = '';
                  this.answerSubmitted = false;
                  this.activeExam = null;
                } else if (data.type === 'EXAM_START') {
                  this.activeExam = data.payload;
                  this.studentExamAnswers = {};
                  this.studentExamSubmitted = false;
                  this.activeQuestion = null;
                } else if (data.type === 'EXAM_STOP') {
                  this.studentExamSubmitted = true;
                }
              });

              const handleDisconnect = () => {
                this.connectionStatus = 'disconnected';
                this.connectionError = 'The teacher ended the session or lost connection.';
              };

              conn.on('close', handleDisconnect);
              conn.on('error', handleDisconnect);
            });

            this.studentPeer.on('error', (err) => {
              if (err.type === 'peer-unavailable') {
                this.connectionError = 'Room code not found. Please verify the code!';
              } else {
                this.connectionError = 'Connection failed: ' + err.message;
              }
              this.connectionStatus = 'error';
            });
          },

          submitStudentAnswer() {
            if (!this.studentAnswer.trim() || !this.studentConn) return;

            this.studentConn.send({ type: 'ANSWER', answer: this.studentAnswer.trim() });
            this.lastSubmittedAnswer = this.studentAnswer.trim();
            this.answerSubmitted = true;
          },

          updateExamAnswer(qIdx, val) {
            this.studentExamAnswers[qIdx] = val;
            if (this.studentConn) {
              this.studentConn.send({
                type: 'EXAM_PROGRESS',
                answers: this.studentExamAnswers
              });
            }
          },

          submitStudentExam() {
            if (this.studentConn) {
              this.studentConn.send({
                type: 'EXAM_SUBMIT',
                answers: this.studentExamAnswers
              });
              this.studentExamSubmitted = true;
            }
          },

          getStudentExamProgressCount() {
            if (!this.activeExam) return 0;
            let answered = 0;
            this.activeExam.questions.forEach((q, idx) => {
              if (this.studentExamAnswers[idx] !== undefined && this.studentExamAnswers[idx] !== '') {
                answered++;
              }
            });
            return answered;
          },

          exportExamResultsToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18);
            doc.text(`${this.currentTeacherExam.title} - Results`, 14, 22);
            doc.setFontSize(11);
            doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 30);
            
            const tableData = this.students.filter(s => s.examSubmitted).map(s => [
              s.name,
              s.score + '%',
              s.feedback
            ]);
            
            doc.autoTable({
              head: [['Student Name', 'Score', 'Feedback']],
              body: tableData,
              startY: 40,
              theme: 'striped',
              headStyles: { fillColor: [79, 70, 229] }
            });
            
            doc.save(`${this.currentTeacherExam.title.replace(/\s+/g, '_')}_Results.pdf`);
          },

          isStudentExamComplete() {
            if (!this.activeExam) return false;
            return this.getStudentExamProgressCount() === this.activeExam.questions.length;
          },

          // Spelling Lab Methods
          setSpellingLabParagraph() {
            const regex = /\[(.*?)\]/g;
            const matches = [];
            let match;
            while ((match = regex.exec(this.spellingLabParagraph)) !== null) {
              matches.push({ original: match[1], answer: '' });
            }
            this.spellingLabBlanks = matches;
          },
          readSpellingLabParagraph() {
            if (this.spellingLabReading) return;
            this.spellingLabReading = true;
            const textToRead = this.spellingLabParagraph.replace(/\[(.*?)\]/g, '$1'); 
            const utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.onend = () => { this.spellingLabReading = false; };
            window.speechSynthesis.speak(utterance);
          },

          numConnectedStudents() {
            return this.students.filter(s => s.connected).length;
          },

          register() {
            const email = this.auth.username + '@dsc.com';
            if (this.studentDB.find(u => u.email === email)) return alert('Username already registered!');
            this.studentDB.push({ email: email, password: this.auth.password, grades: [] });
            this.auth.email = email;
            this.login();
          },
          login() {
            if (!this.auth.password) return alert('Please enter a password!');
            const email = this.auth.username + '@dsc.com';
            const user = this.studentDB.find(u => u.email === email && u.password === this.auth.password);
            if (!user) return alert('Invalid Username or Password!');
            this.auth.email = email;
            this.auth.currentUser = user;
            this.auth.isLoggedIn = true;
            this.auth.mode = 'portal';
          },
          logout() {
            this.auth.isLoggedIn = false;
            this.auth.currentUser = null;
            this.auth.mode = 'login';
          },
          teacherRegister() {
            if (this.teacherDB.find(u => u.email === this.teacherAuth.email)) return alert('Email already registered!');
            this.teacherDB.push({ email: this.teacherAuth.email, password: this.teacherAuth.password });
            this.teacherLogin();
          },
          teacherLogin() {
            if (!this.teacherAuth.password) return alert('Please enter a password!');
            const user = this.teacherDB.find(u => u.email === this.teacherAuth.email && u.password === this.teacherAuth.password);
            if (!user) return alert('Invalid Email or Password!');
            this.teacherAuth.currentUser = user;
            this.teacherAuth.isLoggedIn = true;
            this.teacherAuth.mode = 'portal';
            this.showSecretPopup = false;
            this.role = 'teacher';
          },
          teacherLogout() {
            this.teacherAuth.isLoggedIn = false;
            this.teacherAuth.currentUser = null;
            this.teacherAuth.mode = 'login';
            this.role = 'lobby';
          },

          saveGradeToPortal(item) {
            const student = this.studentDB.find(u => u.email === item.name);
            if (!student) return alert('No portal account matching the email: ' + item.name);
            student.grades.push({ 
              exam: this.currentTeacherExam.title, 
              score: item.score, 
              feedback: item.feedback 
            });
            alert('Grade saved to ' + item.name + "'s portal!");
            item.graded = true;
          },
          
          numAnswersSubmitted() {
            return this.students.filter(s => s.connected && s.answer).length;
          }
        }));
      });
    </script>
  </body>
