<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classroom Real-Time Study</title>
    <!-- jsPDF and AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: [
                "Inter",
                "ui-sans-serif",
                "system-ui",
                "-apple-system",
                "sans-serif",
              ],
              mono: ["JetBrains Mono", "Fira Code", "monospace"],
            },
          },
        },
      };
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- PeerJS CDN -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <!-- AlpineJS CDN -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc; /* Slate-50 */
      }
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body
    class="min-h-screen text-slate-800 flex flex-col antialiased selection:bg-indigo-100"
    x-data="classroomApp"
  >
    <!-- Global Header -->
    <header
      class="w-full border-b border-slate-200/80 bg-white/80 backdrop-blur-md sticky top-0 z-30"
    >
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <div
            class="h-9 w-9 bg-indigo-900 rounded-lg flex items-center justify-center text-white shadow-sm shadow-indigo-200"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 14l9-5-9-5-9 5 9 5z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 14l9-5-9-5-9 5 9 5z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 14v7"
              />
            </svg>
          </div>
          <h1
            @click="handleTitleClick"
            class="text-xl font-bold tracking-tight text-slate-900 cursor-pointer select-none active:scale-95 transition-transform"
            title="Click 3 times to access Teacher Gate"
          >
            Digital School Campus
          </h1>
        </div>

        <div class="flex items-center gap-2">
          <!-- Active Status Badge -->
          <template
            x-if="role === 'student' && connectionStatus === 'connected'"
          >
            <span
              class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-indigo-50 text-indigo-900 border border-indigo-200"
            >
              <span
                class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"
              ></span>
              Enrolled (Student)
            </span>
          </template>
          <template x-if="role === 'teacher'">
            <span
              class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-indigo-900 text-slate-100 border border-indigo-950"
            >
              <span
                class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"
              ></span>
              Administrative Mode
            </span>
          </template>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main
      class="flex-1 flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8 max-w-7xl w-full mx-auto"
    >
      <!-- LOBBY STATE (Initial Entrance) -->
      <template x-if="role === 'lobby' && activeMode === 'single'">
        <div
          class="w-full max-w-md bg-white rounded-2xl border border-slate-200 shadow-xl p-8 transition-all duration-300 hover:shadow-2xl hover:border-slate-300"
          x-cloak
        >
          <div class="text-center mb-8">
            <div
              class="mx-auto w-14 h-14 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mb-4 border border-indigo-100"
            >
              <svg
                class="w-7 h-7"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"
                />
              </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-900">Student Sign-In</h2>
            <p class="text-slate-500 text-sm mt-1.5">
              Enter details below to start submission session
            </p>
          </div>

          <form @submit.prevent="joinAsStudent" class="space-y-5">
            <div>
              <label
                class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5"
                >Your Full Name</label
              >
              <input
                type="text"
                required
                x-model="studentName"
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400 font-medium"
                placeholder="e.g., maheer"
              />
            </div>

            <div>
              <label
                class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5"
                >Personal Passcode</label
              >
              <input
                type="text"
                required
                x-model="studentPasscode"
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400 font-medium font-mono"
                placeholder="e.g., cheetah"
              />
            </div>

            <!-- Error Notice -->
            <template x-if="connectionStatus === 'error'">
              <div
                class="p-3 bg-rose-50 border border-rose-100 rounded-xl text-rose-700 text-xs font-medium flex gap-2 items-start"
              >
                <svg
                  class="w-4 h-4 mt-0.5 shrink-0"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                  />
                </svg>
                <span x-text="connectionError"></span>
              </div>
            </template>

            <!-- Submit Button / Loader -->
            <button
              type="submit"
              :disabled="connectionStatus === 'connecting'"
              class="w-full flex items-center justify-center gap-2.5 bg-slate-900 text-white font-semibold px-5 py-3.5 rounded-xl hover:bg-slate-800 focus:ring-4 focus:ring-slate-900/10 transition-all outline-none disabled:bg-slate-300 disabled:cursor-not-allowed group"
            >
              <template x-if="connectionStatus === 'connecting'">
                <svg
                  class="animate-spin h-5 w-5 text-white"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <circle
                    class="opacity-25"
                    cx="12"
                    cy="12"
                    r="10"
                    stroke="currentColor"
                    stroke-width="4"
                  ></circle>
                  <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                  ></path>
                </svg>
              </template>
              <span
                x-text="connectionStatus === 'connecting' ? 'Connecting to Room...' : 'Connect & Attend Session'"
              ></span>
              <template x-if="connectionStatus !== 'connecting'">
                <svg
                  class="w-4 h-4 transition-transform group-hover:translate-x-1"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13 5l7 7-7 7M5 5l7 7-7 7"
                  />
                </svg>
              </template>
            </button>
          </form>
          <!-- Removed Student Portal and Temporary Student buttons -->
        </div>
      </template>

      <!-- Removed Student Portal layout completely -->

      <!-- STUDENT ROLE STATE -->
      <template x-if="role === 'student'">
        <div class="w-full max-w-3xl flex flex-col gap-6" x-cloak>
          <!-- Student Workspace Dashboard Header -->
          <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm space-y-5">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-50 border border-indigo-150 rounded-xl flex items-center justify-center text-indigo-600 font-extrabold text-sm">
                  <span x-text="studentName.slice(0, 2).toUpperCase()"></span>
                </div>
                <div>
                  <div class="flex items-center gap-2">
                    <h2 class="text-base font-black text-slate-900 leading-tight" x-text="studentName"></h2>
                    <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[10px] font-bold bg-emerald-50 text-emerald-700 border border-emerald-150">
                      <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                      On Roll
                    </span>
                  </div>
                  <p class="text-xs text-slate-400 font-semibold mt-0.5">Connected Classmate Portal • Live Syncing Enabled</p>
                </div>
              </div>

              <div class="flex items-center gap-2">
                <button
                  @click="location.reload()"
                  class="text-xs font-bold text-rose-600 hover:text-rose-700 bg-rose-50 hover:bg-rose-100 border border-rose-150 rounded-xl px-4 py-2.5 transition-all cursor-pointer outline-none"
                >
                  Sign Out
                </button>
              </div>
            </div>

            <!-- Dashboard Navigation Tabs -->
            <div class="border-t border-slate-100 pt-4 flex flex-col sm:flex-row gap-2">
              <div class="flex flex-col sm:flex-row gap-2 p-1.5 bg-slate-50 border border-slate-150/60 rounded-2xl w-full">
                <!-- Tab: Live Class Workspace -->
                <button
                  @click="activeMode = 'single'"
                  class="flex-1 flex items-center justify-center gap-2.5 px-4 py-2.5 rounded-xl text-xs font-bold transition-all relative cursor-pointer outline-none"
                  :class="activeMode === 'single' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-650 hover:text-slate-900 hover:bg-white/60'"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                  </svg>
                  <span>Live Desk & Exams</span>
                  <template x-if="activeQuestion || activeExam">
                    <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse absolute top-2.5 right-2.5"></span>
                  </template>
                </button>

                <!-- Tab: Spelling Lab -->
                <button
                  @click="activeMode = 'spellingLab'"
                  class="flex-1 flex items-center justify-center gap-2.5 px-4 py-2.5 rounded-xl text-xs font-bold transition-all relative cursor-pointer outline-none"
                  :class="activeMode === 'spellingLab' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-650 hover:text-slate-900 hover:bg-white/60'"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V7a3 3 0 016 0v4a3 3 0 01-3 3z" />
                  </svg>
                  <span>Spelling Lab</span>
                  <template x-if="spellingLabParagraph">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse absolute top-2.5 right-2.5"></span>
                  </template>
                </button>

                <!-- Tab: Assignments Queue -->
                <button
                  @click="activeMode = 'assignment'"
                  class="flex-1 flex items-center justify-center gap-2.5 px-4 py-2.5 rounded-xl text-xs font-bold transition-all relative cursor-pointer outline-none"
                  :class="activeMode === 'assignment' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-650 hover:text-slate-900 hover:bg-white/60'"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                  </svg>
                  <span>Assignments</span>
                  <template x-if="assignments.length > 0">
                    <span class="text-[10px] bg-slate-200 text-slate-800 px-2 py-0.5 rounded-full font-mono font-bold" x-text="assignments.length"></span>
                  </template>
                </button>
              </div>
            </div>
          </div>

          <!-- SINGLE Q / EXAM WORKSPACE -->
          <template x-if="activeMode === 'single'">
            <div class="space-y-6">
              <!-- Active Study Area -->
              <template x-if="!activeExam">
                <div
                  class="bg-white border border-slate-200 rounded-2xl shadow-md overflow-hidden animate-fade-in"
                >
                  <!-- MEDIA CONTROLS (ADDED) -->
                  <div
                    class="border-b border-slate-100 bg-slate-50/80 px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4"
                  >
                    <div class="flex items-center gap-2">
                      <span class="w-2.5 h-2.5 bg-indigo-600 rounded-full animate-pulse"></span>
                      <span class="text-xs font-mono font-bold text-slate-500 uppercase tracking-wider">Candidate Feed Status</span>
                    </div>

                    <div class="flex items-center gap-2.5">
                      <!-- Mic Toggle -->
                      <button
                        @click="toggleMic()"
                        class="px-4 py-2.5 rounded-xl text-xs font-extrabold flex items-center gap-2 border transition-all cursor-pointer shadow-3xs"
                        :class="micOn ? 'bg-emerald-600 border-emerald-700 text-white hover:bg-emerald-700' : 'bg-rose-50 border-rose-150 text-rose-600 hover:bg-rose-100'"
                      >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V7a3 3 0 016 0v4a3 3 0 01-3 3z" />
                        </svg>
                        <span x-text="micOn ? 'Live Mic ON' : 'Mic Muted'"></span>
                      </button>

                      <!-- Camera Toggle -->
                      <button
                        @click="toggleCamera()"
                        class="px-4 py-2.5 rounded-xl text-xs font-extrabold flex items-center gap-2 border transition-all cursor-pointer shadow-3xs"
                        :class="cameraOn ? 'bg-emerald-600 border-emerald-700 text-white hover:bg-emerald-700' : 'bg-slate-100 border-slate-200 text-slate-600 hover:bg-slate-200'"
                      >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        <span x-text="cameraOn ? 'Camera Active' : 'Camera Off'"></span>
                      </button>

                      <!-- Hand Raising action -->
                      <button
                        @click="raiseHand()"
                        class="px-4 py-2.5 rounded-xl text-xs font-extrabold flex items-center gap-2 border transition-all cursor-pointer shadow-3xs"
                        :class="handRaised ? 'bg-amber-500 border-amber-605 text-white hover:bg-amber-600 animate-pulse' : 'bg-white border-slate-250 text-slate-650 hover:bg-slate-50'"
                      >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 009 11V5a3 3 0 00-6 0v6c0 1.662.673 3.166 1.758 4.257M14 11c0-1.637-.624-3.129-1.652-4.257M14 11V8.5M14 11v1.5a13.93 13.93 0 01-1.284 5.896m1.284-5.896a13.93 13.93 0 001.284-5.896M14 8.5V6a2 2 0 114 0v6c0 1.104-.448 2.104-1.171 2.829m1.171-2.829a13.93 13.93 0 011.285 5.895" />
                        </svg>
                        <span x-text="handRaised ? 'Hand Raised ✋' : 'Raise Hand'"></span>
                      </button>
                    </div>
                  </div>
                  <!-- HEADER -->
                  <div
                    class="border-b border-slate-200 bg-slate-50 px-6 py-4.5"
                  >
                    <span
                      class="inline-flex items-center gap-1 text-xs font-bold uppercase tracking-wider text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full mb-2"
                    >
                      <span
                        class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-ping"
                      ></span>
                      Broadcasting Feed
                    </span>
                    <h3 class="text-slate-500 text-sm font-medium">
                      Instructor posted question:
                    </h3>
                  </div>

                  <!-- WORKPLATE BODY -->
                  <div class="p-6">
                    <!-- Case: Waiting for Question -->
                    <template x-if="!activeQuestion">
                      <div
                        class="flex flex-col items-center justify-center p-12 text-center"
                      >
                        <div
                          class="w-16 h-16 bg-amber-50 rounded-full border border-amber-100 flex items-center justify-center text-amber-500 animate-pulse mb-4"
                        >
                          <svg
                            class="w-8 h-8"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                          >
                            <path
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="2"
                              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
                            />
                          </svg>
                        </div>
                        <h4 class="text-xl font-bold text-slate-800">
                          Waiting for Question...
                        </h4>
                        <p class="text-slate-400 text-sm max-w-md mt-1.5">
                          The teacher hasn't broadcasted a live question yet.
                          Enjoy the study break! We will activate automatically.
                        </p>
                      </div>
                    </template>

                    <!-- Case: Question Ready to Answer -->
                    <template x-if="activeQuestion">
                      <div class="space-y-6">
                        <!-- The Broadcast Question -->
                        <div
                          class="p-5 bg-indigo-50/50 border border-indigo-100 rounded-xl"
                        >
                          <p
                            class="text-xl sm:text-2xl font-bold text-indigo-955 text-indigo-900 leading-snug font-sans"
                            x-text="activeQuestion"
                          ></p>
                        </div>

                        <!-- Submission State: Submitted -->
                        <template x-if="answerSubmitted">
                          <div
                            class="p-6 bg-slate-50 border border-slate-200 rounded-xl flex flex-col items-center text-center"
                          >
                            <div
                              class="w-12 h-12 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center border border-emerald-100 mb-3"
                            >
                              <svg
                                class="w-6 h-6"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                              >
                                <path
                                  stroke-linecap="round"
                                  stroke-linejoin="round"
                                  stroke-width="2"
                                  d="M5 13l4 4L19 7"
                                />
                              </svg>
                            </div>
                            <h4 class="text-lg font-bold text-slate-800">
                              Your answer has been submitted!
                            </h4>
                            <p class="text-slate-500 text-sm mt-0.5">
                              We've locked your submission. Awaiting new
                              questions.
                            </p>

                            <div
                              class="w-full text-left bg-white border border-slate-200/80 rounded-xl p-4 mt-5"
                            >
                              <span
                                class="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-2"
                                >My Locked Response</span
                              >
                              <p
                                class="text-slate-700 font-medium font-mono text-sm whitespace-pre-wrap leading-relaxed"
                                x-text="lastSubmittedAnswer"
                              ></p>
                            </div>
                          </div>
                        </template>

                        <!-- Submission State: Ready to Answer -->
                        <template x-if="!answerSubmitted">
                          <form
                            @submit.prevent="submitStudentAnswer"
                            class="space-y-4"
                          >
                            <div>
                              <label
                                class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2"
                                >Your Answer Space</label
                              >
                              <textarea
                                required
                                x-model="studentAnswer"
                                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400 h-40 resize-y font-medium text-slate-700 leading-relaxed"
                                placeholder="Type your response or answers precisely here..."
                              ></textarea>
                            </div>

                            <div class="flex items-center justify-between pt-2">
                              <p class="text-xs text-slate-400 font-medium">
                                Responses sync to the teacher in real-time
                                instantly on transmission.
                              </p>
                              <button
                                type="submit"

                          <div class="flex items-center justify-between mb-2">

                            <span class="bg-orange-100 text-orange-850 text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1">

                          <div>

                              class="flex items-center justify-between gap-3 mb-3 border-b border-slate-200/60 pb-2"

                                class="font-bold text-slate-900 text-sm"
                                x-text="item.name"

                                <span
                                  class="inline-flex items-center gap-1 text-[9px] font-bold uppercase tracking-wider text-emerald-755 text-emerald-700 bg-emerald-50 border border-emerald-100 px-2.5 py-1 rounded"
                                >
                                  <span
                                    class="w-1.5 h-1.5 rounded-full bg-emerald-500"
                                  ></span>
                                  Form Submitted
                                </span>
                              </template>
                              <template x-if="!item.examSubmitted">
                                <span
                                  class="inline-flex items-center gap-1 text-[9px] font-bold uppercase tracking-wider text-amber-700 bg-amber-50 border border-amber-100 px-2.5 py-1 rounded"
                                >
                                  <span
                                    class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-ping"
                                  ></span>
                                  Writing Drafts
                                </span>
                              </template>
                            </div>

                            <!-- Live Progress Tracking meter -->
                            <div class="space-y-1.5 mb-4">
                              <div
                                class="flex items-center justify-between text-[11px] text-slate-500"

                                  x-text="`Progress: ${Object.keys(item.examAnswers || {}).length} / ${currentTeacherExam.questions.length}`"
                                ></span>
                                <span
                                  class="font-bold text-slate-700"
                                  x-text="`${Math.round((Object.keys(item.examAnswers || {}).length / currentTeacherExam.questions.length) * 100)}%`"

                                class="w-full bg-slate-200 h-2 rounded-full overflow-hidden"

                                ></div>
                              </div>
                            </div>

                            <!-- Real-time student question engagement telemetry -->
                            <div class="border-t border-slate-200/60 pt-3 mt-3 mb-3 text-xs space-y-3">

                                      Reviewing Summary
                                    </span>
                                  </template>
                                  <template x-if="item.studentQuestionIndex !== 'summary' && item.studentQuestionIndex !== undefined">
                                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-indigo-50 text-indigo-700 font-extrabold uppercase text-[9px]">
                                      <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></span>
                                      Focusing Q<span x-text="parseInt(item.studentQuestionIndex) + 1"></span>
                                    </span>
                                  </template>
                                </div>
                              </div>

                              <!-- Question-by-Question Telemetry Grid -->
                              <div class="space-y-1">

                                <div class="grid grid-cols-5 gap-1 pt-1">
                                  <template x-for="(q, qIdx) in currentTeacherExam.questions" :key="q.id">
                                    <div 
                                      class="rounded-lg p-1.5 border flex flex-col items-center justify-between text-center transition-all"

                                        (item.flaggedQuestions && item.flaggedQuestions[qIdx]) 
                                          ? 'bg-orange-50 border-orange-200 text-orange-950 ring-1 ring-orange-200' 
                                          : ((item.studentQuestionTimeSpent && item.studentQuestionTimeSpent[qIdx] > 40)
                                              ? 'bg-rose-50 border-rose-100 text-rose-950'
                                              : 'bg-white border-slate-150 text-slate-800')
                                      ]"
                                    >

                                      <div class="flex items-center gap-0.5 text-[9px] font-black uppercase text-slate-400">

                                        <template x-if="item.flaggedQuestions && item.flaggedQuestions[qIdx]">

                                        </template>
                                      </div>
                                      
                                      <!-- Time elapsed -->

                                                : 'bg-slate-105 text-slate-700'

                                        </template>
                                        
                                        <!-- Hesitation badge -->

                                          class="w-1.5 h-1.5 rounded-full"

                                              : ((item.studentQuestionTimeSpent && item.studentQuestionTimeSpent[qIdx] > 20) 
                                                  ? 'bg-amber-400' 
                                                  : 'bg-emerald-400')

                                          :title="[
                                            ((item.studentQuestionTimeSpent && item.studentQuestionTimeSpent[qIdx] > 40 && item.studentQuestionChanges && item.studentQuestionChanges[qIdx] >= 4) || (item.studentQuestionTimeSpent && item.studentQuestionTimeSpent[qIdx] > 30 && (!item.studentQuestionChanges || !item.studentQuestionChanges[qIdx]) && (!item.examAnswers || !item.examAnswers[qIdx])))

                                              : ((item.studentQuestionTimeSpent && item.studentQuestionTimeSpent[qIdx] > 20) 
                                                  ? 'Deliberating' 
                                                  : 'Confident')

      x-transition:leave="transition ease-in duration-200"

    >
      <div
        class="bg-white rounded-2xl border border-slate-200 shadow-2xl p-6 max-w-sm w-full transform overflow-hidden"

        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="scale-95 translate-y-4"
        x-transition:enter-end="scale-100 translate-y-0"

                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"

          <button @click="applyPoints('achievement', 1)" class="w-full text-left px-3 py-1.5 text-xs text-slate-700 hover:bg-[#E8F5E9] hover:text-[#2E7D32] rounded transition-colors">+1 Good Classwork</button>
          <button @click="applyPoints('achievement', 2)" class="w-full text-left px-3 py-1.5 text-xs text-slate-700 hover:bg-[#E8F5E9] hover:text-[#2E7D32] rounded transition-colors">+2 Excellent Effort</button>
          <button @click="applyPoints('achievement', 3)" class="w-full text-left px-3 py-1.5 text-xs text-slate-700 hover:bg-[#E8F5E9] hover:text-[#2E7D32] rounded transition-colors">+3 Outstanding</button>

          <button @click="applyPoints('behavior', -2)" class="w-full text-left px-3 py-1.5 text-xs text-slate-700 hover:bg-[#FFEBEE] hover:text-[#C62828] rounded transition-colors">-2 Defiance</button>
          <button @click="applyPoints('behavior', -3)" class="w-full text-left px-3 py-1.5 text-xs text-slate-700 hover:bg-[#FFEBEE] hover:text-[#C62828] rounded transition-colors">-3 Serious Incident</button>
        </div>

    <!-- Application Controller logic -->
    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.data("classroomApp", () => ({
          role: "lobby",
          titleClicks: 0,
          showSecretPopup: false,
          secretPassword: "",
          popupError: false,

          studentName: "",
          studentPasscode: "",
          classCodeInput: "",
          micOn: false,
          cameraOn: false,
          handRaised: false,

          studentPeer: null,
          studentConn: null,
          connectionStatus: "disconnected",
          connectionError: "",
          activeQuestion: null,
          studentAnswer: "",
          answerSubmitted: false,
          aiPromptTemplate: `Generate exam questions. Format as a JSON array:
[
  { "text": "Question text?", "type": "mcq", "options": ["Option A", "Option B", "Option C"], "correct": "Option A" },
  { "text": "Explain concept X.", "type": "text", "options": [], "correct": "" }
]`,
          spellingLabPromptTemplate: `Generate a paragraph suitable for spelling practice in a classroom. Include 5-10 words in brackets [] that students should fill in by listening to the paragraph. For example: 'The quick [brown] fox jumps over the [lazy] dog.' Format as plain text.`,
          jsonImportInput: "",
          copyAIPrompt() {
            navigator.clipboard.writeText(this.aiPromptTemplate);
            alert("Prompt copied to clipboard!");
          },
          copySpellingAIPrompt() {
            navigator.clipboard.writeText(this.spellingLabPromptTemplate);
            alert("Spelling prompt copied to clipboard!");
          },
          importCustomExamQuestions() {
            try {
              const parsed = JSON.parse(this.jsonImportInput);
              if (!Array.isArray(parsed)) throw new Error("Not an array");
              this.customExamQuestions = parsed.map((q, idx) => ({
                id: Date.now() + idx,
                text: q.text || "",
                type: q.type || "text",
                options: q.options || ["", "", "", ""],
                correct: q.correct || "",
              }));
              this.jsonImportInput = "";
              alert("Imported successfully!");
            } catch (e) {
              alert("Invalid JSON format. Please check the prompt format.");
            }
          },
          lastSubmittedAnswer: "",

          teacherPeer: null,
          teacherClassCode: "",
          teacherConnections: {},
          students: [],
          roster: [], // Teacher's pre-registered students list
          newRosterName: "",
          newRosterPasscode: "",
          
          // Selection and Context Menu state
          lastSelectedIndex: -1,
          contextMenuOpen: false,
          contextMenuX: 0,
          contextMenuY: 0,
          
          copied: false,
          newQuestionInput: "",
          currentTeacherQuestion: null,

          // Exam and Progress check states
          activeMode: "single", // 'single' or 'exam' or 'spellingLab'
          examStep: "catalog", // 'catalog', 'live', 'results'

          managementForm: {
            username: "",
            password: "",
          },
          meetingForm: {
            topic: "",
            time: "",
          },
          assignmentForm: {
            title: "",
            description: "",
          },

          meetings: [],
          assignments: [],
          studentAssignments: [],
          studentAssignmentText: "",

          // Portal State
          auth: {
            isLoggedIn: false,
            username: "",
            password: "",
            currentUser: null,
            mode: "login", // 'login' or 'register' or 'portal'
          },
          teacherAuth: {
            isLoggedIn: false,
            username: "",
            password: "",
            currentUser: null,
            mode: "login",
          },
          studentDB: [],
          teacherDB: [],

          // Spelling Lab Data
          spellingLabParagraph: "",

          handleRowClick(idx, event) {
            if (event.shiftKey && this.lastSelectedIndex !== -1) {
              const start = Math.min(this.lastSelectedIndex, idx);
              const end = Math.max(this.lastSelectedIndex, idx);
              for (let i = start; i <= end; i++) {
                this.roster[i].selected = true;
              }
            } else if (event.ctrlKey || event.metaKey) {
              this.roster[idx].selected = !this.roster[idx].selected;
              this.lastSelectedIndex = idx;
            } else {
              this.roster.forEach(s => s.selected = false);
              this.roster[idx].selected = true;
              this.lastSelectedIndex = idx;
            }
          },

          handleRowContextMenu(idx, event) {
            event.preventDefault();
            if (!this.roster[idx].selected) {
              this.roster.forEach(s => s.selected = false);
              this.roster[idx].selected = true;
              this.lastSelectedIndex = idx;
            }
            this.contextMenuX = event.clientX;
            this.contextMenuY = event.clientY;
            this.contextMenuOpen = true;
          },

          applyPoints(type, value) {
            this.roster.forEach((s) => {
              if (s.selected) {
                if (type === 'achievement') {
                  s.achievement = (s.achievement || 0) + value;
                } else if (type === 'behavior') {
                  s.behavior = (s.behavior || 0) + value;
                }
              }
            });
            this.contextMenuOpen = false;
            this.roster.forEach(s => s.selected = false);
          },

          init() {
            // Load persistent DBs
            const savedTeacherDB = localStorage.getItem('DSC_TeacherDB');
            if (savedTeacherDB) this.teacherDB = JSON.parse(savedTeacherDB);

            // Setup reactive watchers for auto-saving
            this.$watch('teacherDB', (val) => {
              localStorage.setItem('DSC_TeacherDB', JSON.stringify(val));
            });
            this.$watch('roster', (val) => {
              if (this.teacherAuth.currentUser) {
                localStorage.setItem(`DSC_Roster_${this.teacherAuth.currentUser.email}`, JSON.stringify(val));
              }
            });

            console.log("Classroom system fully booted!");
            // Live clock to iterate student question engagement times
            setInterval(() => {
              if (this.role === "student" && this.activeExam && !this.studentExamSubmitted) {
                // Timer handling
                if (this.examTimeLeft > 0) {
                  this.examTimeLeft--;
                  if (this.examTimeLeft === 0) {
                    this.submitStudentExam();
                  }
                }

                // Telemetry tracking
                const qIdx = this.studentQuestionIndex;
                if (qIdx !== undefined && qIdx !== null && qIdx !== 'summary') {
                  this.studentQuestionTimeSpent = this.studentQuestionTimeSpent || {};
                  this.studentQuestionTimeSpent[qIdx] = (this.studentQuestionTimeSpent[qIdx] || 0) + 1;
                  
                  // Periodic sync every 2 seconds to make the indicators live
                  if (this.studentQuestionTimeSpent[qIdx] % 2 === 0) {
                    this.sendTelemetry();
                  }
                }
              }
            }, 1000);
          },

          initTeacherPeer() {
            this.teacherClassCode = "ROOM-" + (window.location.hostname.split('.')[0] || "LOCAL").toUpperCase();

            this.teacherPeer = new Peer(this.teacherClassCode);

            this.teacherPeer.on("connection", (conn) => {
              this.teacherConnections[conn.peer] = conn;
              this.addOrUpdateStudent(conn.peer, { connected: true });

              conn.on("open", () => {
                if (this.currentTeacherQuestion) {
                  conn.send({
                    type: "QUESTION",
                    payload: this.currentTeacherQuestion,
                  });
                }
                if (this.currentTeacherExam) {
                  conn.send({
                    type: "EXAM_START",
                    payload: this.currentTeacherExam,
                  });
                }
                if (
                  this.spellingLabParagraph &&
                  this.spellingLabBlanks.length > 0
                ) {
                  conn.send({
                    type: "SPELLING_LAB_START",
                    payload: {
                      paragraph: this.spellingLabParagraph,
                      blanks: this.spellingLabBlanks,
                    },
                  });
                }
              });

              conn.on("data", (data) => {
                if (data.type === "HANDSHAKE") {
                  // Validate against roster
                  const validStudent = this.roster.find(
                    (s) => s.name.toLowerCase() === data.name.toLowerCase() && s.passcode === data.passcode
                  );
                  
                  if (!validStudent) {
                    conn.send({ type: "HANDSHAKE_REJECT" });
                    setTimeout(() => conn.close(), 500);
                    return;
                  }

                  conn.send({ type: "HANDSHAKE_ACCEPT" });

                  this.addOrUpdateStudent(conn.peer, {
                    name: data.name,
                    connected: true,
                  });
                } else if (data.type === "ANSWER") {
                  this.addOrUpdateStudent(conn.peer, { answer: data.answer });
                } else if (data.type === "EXAM_PROGRESS" || data.type === "EXAM_PROGRESS_TELEMETRY") {
                  this.addOrUpdateStudent(conn.peer, {
                    examAnswers: data.answers || {},
                    examSubmitted: false,
                    studentQuestionTimeSpent: data.timeSpent || {},
                    studentQuestionChanges: data.changes || {},
                    flaggedQuestions: data.flagged || {},
                    studentQuestionIndex: data.currentIndex !== undefined ? data.currentIndex : 0,
                  });
                } else if (data.type === "EXAM_SUBMIT") {
                  this.addOrUpdateStudent(conn.peer, {
                    examAnswers: data.answers || {},
                    examSubmitted: true,
                    studentQuestionTimeSpent: data.timeSpent || {},
                    studentQuestionChanges: data.changes || {},
                    flaggedQuestions: data.flagged || {},
                    studentQuestionIndex: data.currentIndex !== undefined ? data.currentIndex : 'summary',
                  });
                }
              });

              const handleDisconnect = () => {
                this.addOrUpdateStudent(conn.peer, { connected: false });
                delete this.teacherConnections[conn.peer];
              };

              conn.on("close", handleDisconnect);
              conn.on("error", handleDisconnect);
            });
          },

           addOrUpdateStudent(id, data) {
             let idx = -1;
             
             // First try to match by name (from handshake)
             if (data.name) {
               idx = this.roster.findIndex(s => s.name === data.name);
             }
             // Otherwise match by the peer connection ID we previously saved
             else {
               idx = this.roster.findIndex(s => s.peerId === id);
             }

             if (idx !== -1) {
               this.roster[idx] = { 
                 ...this.roster[idx], 
                 peerId: id,
                 ...data 
               };
               this.roster = [...this.roster]; // maintain reactivity for Alpine
             }
             // Connection attempts that don't match roster are ignored
           },

          getCohortMetrics() {
            const connectedStudents = this.roster.filter(s => s.connected);
            const total = connectedStudents.length;
            if (!total) return { flaggedCounts: {}, hesitationCounts: {}, averageTime: 0 };
            
            const flaggedCounts = {};
            const hesitationCounts = {};
            let totalTimeSpent = 0;
            let totalTimeCount = 0;
            
            connectedStudents.forEach(s => {
              // Flagged
              if (s.flaggedQuestions) {
                Object.keys(s.flaggedQuestions).forEach(qIdx => {
                  if (s.flaggedQuestions[qIdx]) {
                    flaggedCounts[qIdx] = (flaggedCounts[qIdx] || 0) + 1;
                  }
                });
              }
              
              // Hesitation and Time
              if (s.studentQuestionTimeSpent) {
                Object.keys(s.studentQuestionTimeSpent).forEach(qIdx => {
                  const timeSecs = s.studentQuestionTimeSpent[qIdx];
                  const changes = s.studentQuestionChanges ? (s.studentQuestionChanges[qIdx] || 0) : 0;
                  totalTimeSpent += timeSecs;
                  totalTimeCount++;
                  
                  // Hesitation classification
                  let isHesitant = false;
                  if (timeSecs > 40 && changes >= 4) {
                    isHesitant = true; // revising too much
                  } else if (timeSecs > 30 && changes === 0 && (!s.examAnswers || !s.examAnswers[qIdx])) {
                    isHesitant = true; // stuck / idle
                  }
                  if (isHesitant) {
                    hesitationCounts[qIdx] = (hesitationCounts[qIdx] || 0) + 1;
                  }
                });
              }
            });
            
            return {
              flaggedCounts,
              hesitationCounts,
              averageTime: totalTimeCount > 0 ? Math.round(totalTimeSpent / totalTimeCount) : 0
            };
          },

          formatTime(seconds) {
            if (!seconds) return "0s";
            if (seconds < 60) return `${seconds}s`;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return secs > 0 ? `${mins}m ${secs}s` : `${mins}m`;
          },

            if (!this.newQuestionInput.trim()) return;
            this.currentTeacherQuestion = this.newQuestionInput.trim();

            this.roster = this.roster.map((s) => ({ ...s, answer: null }));

            Object.values(this.teacherConnections).forEach((conn) => {
              conn.send({
                type: "QUESTION",
                payload: this.currentTeacherQuestion,
              });
            });

            this.newQuestionInput = "";

          launchCustomExam() {

            );

            const examObj = {

                  q.type === "mcq"
                    ? q.options.filter((o) => o.trim() !== "")
                    : [],
                correct: q.type === "mcq" ? q.correct || q.options[0] : "",
              })),

          joinAsStudent() {
            if (!this.studentName.trim() || !this.studentPasscode.trim()) return;

            this.connectionStatus = "connecting";
            this.connectionError = "";

            const teacherCodeName = "ROOM-" + (window.location.hostname.split('.')[0] || "LOCAL").toUpperCase();
            this.studentPeer = new Peer();

            this.studentPeer.on("open", (id) => {
              const conn = this.studentPeer.connect(teacherCodeName);
              this.studentConn = conn;

              conn.on("open", () => {
                this.connectionStatus = "connected";
                // Don't set role to student just yet, wait for teacher to verify handshake
                conn.send({ 
                  type: "HANDSHAKE", 
                  name: this.studentName.trim(),
                  passcode: this.studentPasscode.trim()
                });
              });

              conn.on("data", (data) => {
                if (data.type === "HANDSHAKE_ACCEPT") {
                  this.role = "student";
                } else if (data.type === "HANDSHAKE_REJECT") {
                  this.connectionStatus = "disconnected";
                  this.connectionError = "Invalid name or passcode. Please check with your teacher.";
                  conn.close();
                } else if (data.type === "QUESTION") {
                  this.activeQuestion = data.payload;
                  this.studentAnswer = "";
                  this.answerSubmitted = false;
                  this.activeExam = null;
                } else if (data.type === "EXAM_START") {
                  this.activeExam = data.payload;
                  this.examTimeLeft = data.timeLimit || 3600; // Default 1 hour if not set
                  this.studentExamAnswers = {};
                  this.studentExamSubmitted = false;
                  this.studentQuestionIndex = 0;
                  this.flaggedQuestions = {};
                  this.studentQuestionTimeSpent = {};
                  this.studentQuestionChanges = {};
                  this.activeQuestion = null;
                } else if (data.type === "EXAM_STOP") {
                  this.studentExamSubmitted = true;
                } else if (data.type === "SPELLING_LAB_START") {
                  this.activeMode = "spellingLab";
                  this.spellingLabParagraph = data.payload.paragraph;
                  // Deep copy the blanks to avoid reference issues
                  this.spellingLabBlanks = data.payload.blanks.map((b) => ({
                    ...b,
                  }));
                }
              });

              const handleDisconnect = () => {
                this.connectionStatus = "disconnected";
                this.connectionError =
                  "The teacher ended the session or lost connection.";
              };

              conn.on("close", handleDisconnect);
              conn.on("error", handleDisconnect);
            });

            this.studentPeer.on("error", (err) => {
              if (err.type === "peer-unavailable") {
                this.connectionError =
                  "Room code not found. Please verify the code!";
              } else {
                this.connectionError = "Connection failed: " + err.message;
              }
              this.connectionStatus = "error";
            });
          },

          submitStudentAnswer() {
            if (!this.studentAnswer.trim() || !this.studentConn) return;

            this.studentConn.send({
              type: "ANSWER",
              answer: this.studentAnswer.trim(),
            });
            this.lastSubmittedAnswer = this.studentAnswer.trim();
            this.answerSubmitted = true;
          },

          updateExamAnswer(qIdx, val) {
            this.studentExamAnswers[qIdx] = val;
            this.studentQuestionChanges = this.studentQuestionChanges || {};
            this.studentQuestionChanges[qIdx] = (this.studentQuestionChanges[qIdx] || 0) + 1;
            this.sendTelemetry();
          },

          submitStudentExam() {
            if (this.studentConn) {
              this.studentConn.send({
                type: "EXAM_SUBMIT",
                answers: this.studentExamAnswers,
                timeSpent: this.studentQuestionTimeSpent || {},
                changes: this.studentQuestionChanges || {},
                flagged: this.flaggedQuestions || {},
                currentIndex: 'summary',
              });
              this.studentExamSubmitted = true;
            }
          },

          toggleFlag(idx) {
            this.flaggedQuestions = this.flaggedQuestions || {};
            this.flaggedQuestions[idx] = !this.flaggedQuestions[idx];
            this.sendTelemetry();
          },

          sendTelemetry() {
            if (this.studentConn) {
              this.studentConn.send({
                type: "EXAM_PROGRESS_TELEMETRY",
                answers: this.studentExamAnswers,
                timeSpent: this.studentQuestionTimeSpent || {},
                changes: this.studentQuestionChanges || {},
                flagged: this.flaggedQuestions || {},
                currentIndex: this.studentQuestionIndex,
              });
            }
          },

          getStudentExamProgressCount() {
            if (!this.activeExam) return 0;
            let answered = 0;
            this.activeExam.questions.forEach((q, idx) => {
              if (
                this.studentExamAnswers[idx] !== undefined &&
                this.studentExamAnswers[idx] !== ""
              ) {
                answered++;
              }
            });
            return answered;
          },

                status,
                s.score !== undefined ? `${s.score}%` : "100%",
                s.feedback || "Exceptional work, very thorough response!"
              ];
            });

            doc.autoTable({
              head: [["Student Name", "Submission Status", "Final Score", "Feedback & Qualitative Commentary"]],
              body: tableData,
              startY: tableStartY + 5,
              theme: "striped",
              headStyles: {
                fillColor: [79, 70, 229], // Indigo 600
                fontSize: 9,
                fontStyle: "bold"
              },
              bodyStyles: {
                fontSize: 8.5,
                cellPadding: 4,
                textColor: [51, 65, 85] // Slate-700
              },
              columnStyles: {
                0: { cellWidth: 35 },
                1: { cellWidth: 32 },
                2: { cellWidth: 20 },
                3: { cellWidth: 95 }
              },
              didDrawPage: (data) => {
                // Draw bottom footer watermark on any dynamically created autotable pages
                const str = `Page ${currentPage + doc.internal.getNumberOfPages() - 1}`;
                doc.setFont("helvetica", "normal");
                doc.setFontSize(8);
                doc.setTextColor(148, 163, 184);
                doc.text(str, 196 - doc.getTextWidth(str), 287);
              }
            });

            // Update page count tracking
            currentPage = doc.internal.getNumberOfPages();

            // Section 4: Deep-dive individual response cards (Appended Appendix)
            currentPage++;
            let rY = startNewPage(currentPage);

            doc.setFont("helvetica", "bold");
            doc.setFontSize(14);
            doc.setTextColor(15, 23, 42); // slate-900
            doc.text("4. INDIVIDUAL RESPONSE ANALYTICAL BREAKDOWN (APPENDIX)", 14, rY);

            doc.setFont("helvetica", "normal");
            doc.setFontSize(8.5);
            doc.setTextColor(100, 116, 139); // slate-500
            doc.text("A comprehensive compilation of exact participant textual inputs, match verification, and qualitative assessments.", 14, rY + 5);

            doc.setDrawColor(226, 232, 240); // slate-200
            doc.setLineWidth(0.5);
            doc.line(14, rY + 8, 196, rY + 8);

            rY += 15;

            activeStudents.forEach((student, index) => {
              // Reserve around 50mm space per student, otherwise start new page
              if (rY > 230) {
                currentPage++;
                rY = startNewPage(currentPage);
              }

              // Draw beautiful backdrop container for student card
              doc.setFillColor(248, 250, 252); // slate-50
              doc.setDrawColor(230, 235, 245); // light-indigo/slate border
              doc.rect(14, rY, 182, 8, "FD");

              // Student header card title
              doc.setFont("helvetica", "bold");
              doc.setFontSize(9.5);
              doc.setTextColor(30, 41, 59); // slate-800
              doc.text(
                `${student.name.toUpperCase()}  |  Score: ${student.score}%  |  Status: ${student.examSubmitted ? "Verified Submission" : "Drafting / Inactive"}`,
                18,
                rY + 5.5
              );

              rY += 13;

              questions.forEach((q, qIdx) => {
                if (rY > 265) {
                  currentPage++;
                  rY = startNewPage(currentPage);
                }

                doc.setFont("helvetica", "bold");
                doc.setFontSize(9);
                doc.setTextColor(100, 116, 139); // Slate-500
                const truncatedQuestion = q.text.length > 75 ? `${q.text.substring(0, 75)}...` : q.text;
                doc.text(`Question ${qIdx + 1}: ${truncatedQuestion}`, 18, rY);
                rY += 4.5;

                const answerText = student.examAnswers && student.examAnswers[qIdx] !== undefined && student.examAnswers[qIdx] !== ""
                  ? String(student.examAnswers[qIdx])
                  : "No response recorded";

                doc.setFont("helvetica", "normal");
                doc.setTextColor(51, 65, 85); // slate-700
                const wrappedAnsText = doc.splitTextToSize(`Student Answer: "${answerText}"`, 172);
                doc.text(wrappedAnsText, 22, rY);

                rY += wrappedAnsText.length * 4.2 + 1.5;

                // For MCQ questions, auto-validate display
                if (q.type === "mcq" && q.correct && answerText !== "No response recorded") {
                  if (rY > 270) {
                    currentPage++;
                    rY = startNewPage(currentPage);
                  }
                  const isCorrectResult = answerText.trim().toLowerCase() === q.correct.trim().toLowerCase();
                  doc.setFont("helvetica", "bold");
                  doc.setFontSize(8);
                  if (isCorrectResult) {
                    doc.setTextColor(16, 185, 129); // Emerald-500
                    doc.text("✓ Verified Answer Match", 22, rY);
                  } else {
                    doc.setTextColor(239, 68, 68); // Red-500
                    doc.text(`✗ Inaccurate match. Required target: ${q.correct}`, 22, rY);
                  }
                  rY += 4.5;
                }
              });

              // Instructor Commentary section inside the card
              if (rY > 265) {
                currentPage++;
                rY = startNewPage(currentPage);
              }

              doc.setFont("helvetica", "bold");
              doc.setFontSize(8.5);
              doc.setTextColor(79, 70, 229); // Indigo-600
              doc.text("Instructor Qualitative Commentary:", 18, rY);
              rY += 4.2;

              doc.setFont("helvetica", "italic");
              doc.setTextColor(100, 116, 139); // Slate-500
              const feedbackCommentary = student.feedback || "Exceptional work, very thorough response!";
              const wrappedFeedback = doc.splitTextToSize(feedbackCommentary, 172);
              doc.text(wrappedFeedback, 18, rY);

              rY += wrappedFeedback.length * 4.2 + 8; // generous spacing between student entries
            });

            // Trigger natural file download
            const sanitizedTitle = examTitle.replace(/\s+/g, "_");
            doc.save(`${sanitizedTitle}_Full_Report.pdf`);
          },

          isStudentExamComplete() {
            if (!this.activeExam) return false;
            return (
              this.getStudentExamProgressCount() ===
              this.activeExam.questions.length
            );
          },

          // Spelling Lab Methods
          setSpellingLabParagraph() {
            const regex = /\[(.*?)\]/g;
            const matches = [];
            let match;
            while ((match = regex.exec(this.spellingLabParagraph)) !== null) {
              matches.push({ original: match[1], answer: "" });
            }
            this.spellingLabBlanks = matches;

            // Broadcast to all students
            if (this.role === "teacher") {
              Object.values(this.teacherConnections).forEach((conn) => {
                conn.send({
                  type: "SPELLING_LAB_START",
                  payload: {
                    paragraph: this.spellingLabParagraph,
                    blanks: this.spellingLabBlanks,
                  },
                });
              });
            }
          },
          readSpellingLabParagraph() {
            if (this.spellingLabReading) return;
            this.spellingLabReading = true;
            const textToRead = this.spellingLabParagraph.replace(
              /\[(.*?)\]/g,
              "$1",
            );
            const utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.onend = () => {
              this.spellingLabReading = false;
            };
            window.speechSynthesis.speak(utterance);
          },

          raiseHand() {
            this.handRaised = !this.handRaised;
          },
          toggleMic() {
            this.micOn = !this.micOn;
          },
          toggleCamera() {
            this.cameraOn = !this.cameraOn;
          },
          async shareScreen() {
            try {
              const stream = await navigator.mediaDevices.getDisplayMedia({
                video: true,
              });
              alert("Screen sharing started!");
              // In a real app, you would handle this stream (e.g. via PeerJS)
              stream
                .getTracks()
                .forEach(
                  (track) =>
                    (track.onended = () => alert("Screen sharing stopped")),
                );
            } catch (err) {
              console.error("Error: " + err);
              alert("Could not share screen: " + err.message);
            }
          },

          numConnectedStudents() {
            return this.roster.filter((s) => s.connected).length;
          },

          register() {
            const email = this.auth.username + "@dsc.com";
            if (this.studentDB.find((u) => u.email === email))
              return alert("Username already registered!");
            this.studentDB.push({
              email: email,
              password: this.auth.password,
              grades: [],
            });
            this.auth.email = email;
            this.login();
          },
          login() {
            if (!this.auth.password) return alert("Please enter a password!");
            const email = this.auth.username + "@dsc.com";
            const user = this.studentDB.find(
              (u) => u.email === email && u.password === this.auth.password,
            );
            if (!user) return alert("Invalid Username or Password!");
            this.auth.email = email;
            this.auth.currentUser = user;
            this.auth.isLoggedIn = true;
            this.auth.mode = "portal";
          },
          logout() {
            this.auth.isLoggedIn = false;
            this.auth.currentUser = null;
            this.auth.mode = "login";
          },
          teacherRegister() {
            if (this.teacherDB.find((u) => u.email === this.teacherAuth.email))
              return alert("Email already registered!");
            this.teacherDB.push({
              email: this.teacherAuth.email,
              password: this.teacherAuth.password,
            });
            this.teacherLogin();
          },
          teacherLogin() {
            if (!this.teacherAuth.password)
              return alert("Please enter a password!");
            const user = this.teacherDB.find(
              (u) =>
                u.email === this.teacherAuth.email &&
                u.password === this.teacherAuth.password,
            );
            if (!user) return alert("Invalid Email or Password!");
            this.teacherAuth.currentUser = user;
            
            // Load roster for this teacher
            const savedRoster = localStorage.getItem(`DSC_Roster_${user.email}`);
            if (savedRoster) {
              this.roster = JSON.parse(savedRoster);
            } else {
              this.roster = [];
            }
            
            this.teacherAuth.isLoggedIn = true;
            this.teacherAuth.mode = "portal";
            this.showSecretPopup = false;
            this.enterTeacherMode();
          },
          teacherLogout() {
            this.teacherAuth.isLoggedIn = false;
            this.teacherAuth.currentUser = null;
            this.teacherAuth.mode = "login";
            this.role = "lobby";
          },

          saveAndFinalizeGrade(item) {
            item.graded = true;
            alert("Grade and feedback comments permanently sealed for " + item.name + "!");
          },

          numAnswersSubmitted() {
            return this.roster.filter((s) => s.connected && s.answer).length;
          },
        }));
      });
    </script>
  </body>
</html>
